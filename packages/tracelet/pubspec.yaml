name: tracelet
description: >-
  Production-grade background geolocation for Flutter. Battery-conscious
  tracking, geofencing, SQLite persistence, HTTP sync, and headless
  execution for iOS & Android.
version: 3.0.0
license: Apache-2.0
homepage: https://github.com/Ikolvi/Tracelet
repository: https://github.com/Ikolvi/Tracelet/tree/main/packages/tracelet
issue_tracker: https://github.com/Ikolvi/Tracelet/issues
resolution: workspace
topics:
  - geolocation
  - location
  - background
  - geofencing

screenshots:
  - description: 'Tracelet logo'
    path: doc/tracelet-logo.jpeg

environment:
  sdk: ^3.10.3
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  tracelet_platform_interface: ^3.0.0
  tracelet_android: ^3.0.0
  tracelet_ios: ^3.0.0
  tracelet_web: ^3.0.0
  collection: ^1.19.1
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: tracelet_android
      ios:
        default_package: tracelet_ios
      web:
        default_package: tracelet_web
