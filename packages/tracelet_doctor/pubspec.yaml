name: tracelet_doctor
description: >-
  Drop-in diagnostic overlay widget for Tracelet. Visualizes permissions,
  battery health, OEM compatibility, sensor availability, and tracking
  state with actionable fix suggestions.
version: 3.3.0
license: Apache-2.0
homepage: https://github.com/Ikolvi/Tracelet
documentation: https://tracelet.ikolvi.com
repository: https://github.com/Ikolvi/Tracelet/tree/main/packages/tracelet_doctor
funding:
  - https://github.com/sponsors/GalacticTitan
  - https://www.buymeacoffee.com/kiranbjm
  - https://thanks.dev/d/gh/galactictitan/dependencies
  - https://www.patreon.com/c/kiranbjm

issue_tracker: https://github.com/Ikolvi/Tracelet/issues
resolution: workspace
topics:
  - geolocation
  - diagnostics
  - debug
  - developer-tools

environment:
  sdk: ^3.10.3
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  tracelet: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
