rootProject.name = 'tracelet_sync'

// Composite build: use local SDK modules during development.
// When the plugin is consumed from pub.dev, this path won't exist
// and Gradle will resolve from Maven Central.
def localSdkDir = file("../../../sdk/android")
if (localSdkDir.exists()) {
    includeBuild(localSdkDir) {
        dependencySubstitution {
            substitute module("com.ikolvi:tracelet-sdk") using project(":tracelet-sdk")
            substitute module("com.ikolvi:tracelet-sync-sdk") using project(":tracelet-sync-sdk")
        }
    }
}
