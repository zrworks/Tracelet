name: Bug Report
description: File a bug report to help us improve Tracelet.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible to help us reproduce the issue.
        **Tip:** Open the `TraceletDoctor` overlay and tap **Copy Bug Report** (⧉) or **Share Bug Report** (↗). It bundles health, configuration (secrets redacted), recent logs, and telematics into one report — paste it below. See the [Diagnostics & Bug Reports guide](https://tracelet.ikolvi.com/en/core/diagnostics).

  - type: dropdown
    id: package
    attributes:
      label: Package Name
      description: Which package in the Tracelet monorepo is this bug related to?
      options:
        - tracelet (Core Plugin)
        - tracelet_doctor
        - tracelet_sync
        - tracelet_supabase
        - tracelet_firebase
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tracelet Version
      description: Which version of the package are you using? (see your `pubspec.yaml` or `pubspec.lock`)
      placeholder: e.g. 3.3.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) did you experience the issue on?
      multiple: true
      options:
        - Android
        - iOS
        - Web
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS Version
      description: What device and OS version did you test on? (e.g., iPhone 15 Pro iOS 17.4, Pixel 7 Android 14)
      placeholder: e.g. iPhone 15 Pro, iOS 17.4
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description / Scenario
      description: What happened? What did you expect to happen? Please describe the scenario.
      placeholder: I started background tracking but it stopped after 10 minutes...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce / Code Snippet
      description: How can we reproduce this? Please provide a code snippet, or link to a minimal reproducible example (MRE) repository.
      placeholder: |
        1. Call `Tracelet.start(...)` with this configuration...
        2. Put app in background...
        3. ...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### 🩺 Tracelet Doctor — the fastest way to help us debug
        Tracelet ships with a built-in diagnostic overlay (`tracelet_doctor`). Open it in your app and tap **Copy Bug Report** (⧉) or **Share Bug Report** (↗) to capture **permissions, battery/OEM health, sensors, your active configuration (with secrets redacted), recent logs, and telematics** — all in one paste-ready report. This single report answers most of our triage questions, so please include it below whenever you can.
        > Don't have the overlay wired up yet? `TraceletDoctor.show(context)` opens it from any button — see the [guide](https://tracelet.ikolvi.com/en/core/diagnostics).

  - type: textarea
    id: doctor_report
    attributes:
      label: Tracelet Doctor Bug Report
      description: Paste the report from **Copy Bug Report** / **Share Bug Report** here. It includes health, configuration (secrets redacted), recent logs, and telematics.
      placeholder: |
        # Tracelet Bug Report

        ## Health check
        | Field | Value |
        |---|---|
        | Platform | android |
        ...
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Traces
      description: Please paste any relevant console logs or stack traces.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Check before submitting
      options:
        - label: I have read the Tracelet documentation and FAQs.
          required: true
        - label: I have searched for existing issues.
          required: true
