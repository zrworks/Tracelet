name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Need full history to commit back to main
          fetch-depth: 0
          token: ${{ secrets.ADMIN_PAT || secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y --force cargo-expand flutter_rust_bridge_codegen

      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate

      - name: Build Host Rust Library
        working-directory: sdk/rust-core
        run: cargo build --release

      - name: Setup LD_LIBRARY_PATH for benchmarks
        run: echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/sdk/rust-core/target/release:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Bootstrap
        run: melos bootstrap

      - name: Run benchmarks
        id: bench
        working-directory: benchmark
        run: |
          # Run Dart benchmarks
          flutter test test/tracelet_benchmark_test.dart --reporter expanded 2>&1 | tee benchmark_output.txt
          mv benchmark_results.json dart_results.json
          
          # Run Rust benchmarks
          cd ../sdk/rust-core
          cargo run --release --bin benchmark
          mv benchmark_results.json ../../benchmark/rust_results.json
          cd ../../benchmark
          
          # Merge results and regenerate table
          python3 -c "
          import json
          with open('dart_results.json') as f: dart = json.load(f)
          with open('rust_results.json') as f: rust = json.load(f)
          merged = dart.copy()
          merged.update(rust)
          with open('benchmark_results.json', 'w') as f: json.dump(merged, f, indent=2)
          
          with open('benchmark_table.md', 'w') as f:
              f.write('| Benchmark | ops/sec | µs/op |\n')
              f.write('|---|---:|---:|\n')
              for name, us_per_op in merged.items():
                  ops_per_sec = int(1_000_000 / us_per_op) if us_per_op > 0 else 0
                  f.write(f'| {name} | {ops_per_sec} | {us_per_op:.2f} |\n')
          "

      - name: Update BENCHMARK.md
        working-directory: benchmark
        run: |
          python3 -c "
          import subprocess, re, pathlib

          date = subprocess.check_output(['date', '-u', '+%Y-%m-%d'], text=True).strip()
          dart_ver = subprocess.check_output(['dart', '--version'], text=True, stderr=subprocess.STDOUT)
          dart_ver = re.search(r'\d+\.\d+\.\d+', dart_ver).group()
          commit = subprocess.check_output(['git', 'rev-parse', '--short', 'HEAD'], text=True).strip()

          # Read the markdown table directly from the generated file
          table_path = pathlib.Path('benchmark_table.md')
          if table_path.exists():
              table = table_path.read_text().strip()
          else:
              table = '(no table captured)'

          entry = f'''### {date} — Commit {commit}

          **Environment:** Dart {dart_ver}, ubuntu-latest (CI)

          {table}
          '''
          # Dedent the entry (remove leading 10-space indent from heredoc)
          import textwrap
          entry = textwrap.dedent(entry)

          bm = pathlib.Path('../BENCHMARK.md')
          content = bm.read_text()

          marker = '## Results History'
          if marker in content:
              idx = content.index(marker) + len(marker)
              content = content[:idx] + '\n\n' + entry + content[idx:]
          else:
              content += f'\n{marker}\n\n{entry}\n'

          bm.write_text(content)
          print(f'Updated BENCHMARK.md with entry for {date} ({commit})')

          # Prune: keep exactly the latest 50 entries (releases)
          content = bm.read_text()
          # Split on entry headers
          parts = re.split(r'(?=^### \d{4}-\d{2}-\d{2})', content, flags=re.MULTILINE)
          header = parts[0]
          history_entries = parts[1:]
          
          # Keep exactly the latest 50 entries
          kept_entries = history_entries[:50]
          pruned = len(history_entries) - len(kept_entries)
          
          new_content = header + ''.join(kept_entries)
          bm.write_text(new_content)
          print(f'Pruned {pruned} older benchmark entries, keeping the latest 50 releases')
          "

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if BENCHMARK.md changed
          if git diff --quiet BENCHMARK.md; then
            echo "No benchmark changes to commit"
          else
            git add BENCHMARK.md
            git commit -m "chore(ci): update benchmark results [skip ci]"
            git push
          fi

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benchmark/benchmark_output.txt
            benchmark/benchmark_results.json
          retention-days: 90

      - name: Performance regression check
        working-directory: benchmark
        run: |
          # Parse JSON and check for regressions against thresholds
          # Critical operations must be < 10 µs/op
          echo "Checking performance thresholds..."
          
          python3 -c "
          import json, sys

          with open('benchmark_results.json') as f:
              results = json.load(f)

          # Critical thresholds (µs/op)
          thresholds = {
              'kalman_process_single': 5.0,
              'haversine_single': 5.0,
              'pip_4v': 5.0,
              'location_fromMap': 10.0,
              'location_copyWithCoords': 5.0,
              'adaptive_compute': 5.0,
              'battery_budget_single_sample': 5.0,
              'carbon_onLocation': 5.0,
              'persist_decider_location': 5.0,
              'config_fromMap': 20.0,
              'state_fromMap': 20.0,
              'delta_encode_100': 1000.0,
              'delta_decode_100': 500.0,
          }

          failed = False
          for name, max_us in thresholds.items():
              actual = results.get(name, 0)
              status = '✅' if actual <= max_us else '❌ REGRESSION'
              print(f'{status} {name}: {actual:.2f} µs/op (threshold: {max_us} µs)')
              if actual > max_us:
                  failed = True

          if failed:
              print()
              print('⚠️ Performance regression detected!')
              sys.exit(1)
          else:
              print()
              print('All benchmarks within thresholds.')
          "
