name: tracelet_ios
description: iOS implementation of the Tracelet background geolocation plugin.
version: 3.2.16
topics:
  - location
  - background
  - geofencing
  - ios
license: Apache-2.0
homepage: https://github.com/Ikolvi/Tracelet
documentation: https://tracelet.ikolvi.com
repository: https://github.com/Ikolvi/Tracelet/tree/main/packages/tracelet_ios
funding:
  - https://github.com/sponsors/GalacticTitan
  - https://www.buymeacoffee.com/kiranbjm
  - https://thanks.dev/d/gh/galactictitan/dependencies
  - https://www.patreon.com/c/kiranbjm

resolution: workspace

environment:
  sdk: ^3.10.3
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  tracelet_platform_interface: ^3.2.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: tracelet
    platforms:
      ios:
        pluginClass: TraceletIosPlugin
        dartPluginClass: TraceletIos
