name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Melos
        run: dart pub global activate melos
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y cargo-expand flutter_rust_bridge_codegen
      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate
      - name: Check for uncommitted generated files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Generated files are out of date!"
            echo "Please run 'flutter_rust_bridge_codegen generate' locally and commit the changes."
            git diff
            exit 1
          fi
          echo "✅ Generated files are up to date."
      - name: Bootstrap
        run: melos bootstrap
      - name: Check formatting
        run: melos run format
      - name: Analyze
        run: melos run analyze

  test:
    name: Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        package:
          - tracelet
          - tracelet_platform_interface
          - tracelet_android
          - tracelet_ios
          - tracelet_web
          - tracelet_doctor
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Melos
        run: dart pub global activate melos
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y cargo-expand flutter_rust_bridge_codegen
      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate
      - name: Build Host Rust Library
        working-directory: sdk/rust-core
        run: cargo build --release
      - name: Setup LD_LIBRARY_PATH for tests
        run: echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/sdk/rust-core/target/release:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      - name: Bootstrap
        run: melos bootstrap
      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: flutter test --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Melos
        run: dart pub global activate melos
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install flutter_rust_bridge_codegen & cargo-ndk
        run: |
          cargo binstall -y cargo-expand flutter_rust_bridge_codegen
          cargo binstall -y cargo-ndk
      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate
      - name: Bootstrap
        run: melos bootstrap

      - name: Build Android Rust Core
        run: ./sdk/rust-core/build-android.sh

      - name: Build example APK
        working-directory: example
        run: flutter build apk --release

      - name: Verify FRB Symbols in Release APK
        working-directory: example
        run: |
          unzip -q build/app/outputs/flutter-apk/app-release.apk -d extracted_apk
          SO="extracted_apk/lib/arm64-v8a/libtracelet_core.so"
          if ! nm -D "$SO" | grep -q "frbgen_tracelet"; then
            echo "❌ ERROR: flutter_rust_bridge symbols were stripped from the Android Release APK!"
            exit 1
          fi
          COUNT=$(nm -D "$SO" | grep -c "frbgen_tracelet")
          echo "✅ Verified $COUNT frbgen_tracelet symbols present in the APK"
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Melos
        run: dart pub global activate melos
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y cargo-expand flutter_rust_bridge_codegen
      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate
      - name: Bootstrap
        run: melos bootstrap

      - name: Build iOS Rust Core
        run: ./sdk/rust-core/build-ios.sh

      - name: Build example iOS
        working-directory: example
        run: flutter build ios --no-codesign --release

      - name: Verify FRB Symbols are not stripped
        working-directory: example
        run: |
          if ! nm -g build/ios/iphoneos/Runner.app/Runner | grep -q "frbgen_tracelet"; then
            echo "❌ ERROR: flutter_rust_bridge symbols were stripped from the iOS Release build!"
            exit 1
          fi
          echo "✅ Verified flutter_rust_bridge symbols are present."

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Melos
        run: dart pub global activate melos
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y cargo-expand flutter_rust_bridge_codegen
      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate
      - name: Bootstrap
        run: melos bootstrap
      - name: Build example Web
        working-directory: example
        run: flutter build web

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: false
          path: coverage-artifacts

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Merge coverage
        run: |
          mkdir -p coverage
          LCOV_FILES=""
          for pkg in tracelet tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet_doctor; do
            FILE="coverage-artifacts/coverage-${pkg}/lcov.info"
            if [ -f "$FILE" ]; then
              LCOV_FILES="$LCOV_FILES -a $FILE"
            fi
          done
          if [ -n "$LCOV_FILES" ]; then
            lcov $LCOV_FILES -o coverage/merged.lcov.info
            lcov --summary coverage/merged.lcov.info
          else
            echo "No coverage files found"
            exit 0
          fi

      - name: Upload merged coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-merged
          path: coverage/merged.lcov.info
          if-no-files-found: ignore

  validate:
    name: Validate Monorepo
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5

      - name: Check version consistency
        run: |
          echo "Checking version consistency across packages..."
          VERSIONS=""
          for pkg in tracelet tracelet_platform_interface tracelet_android tracelet_ios tracelet_web; do
            VER=$(grep '^version:' "packages/$pkg/pubspec.yaml" | awk '{print $2}')
            echo "  $pkg: $VER"
            VERSIONS="$VERSIONS $VER"
          done
          # All versions should be identical
          UNIQUE=$(echo $VERSIONS | tr ' ' '\n' | sort -u | wc -l | tr -d ' ')
          if [ "$UNIQUE" -ne 1 ]; then
            echo "❌ Version mismatch detected!"
            exit 1
          fi
          echo "✅ All packages at version$(echo $VERSIONS | awk '{print $1}')"

      - name: Check CHANGELOG entries
        run: |
          echo "Checking CHANGELOG.md files exist and have entries..."
          for pkg in tracelet tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet_doctor; do
            FILE="packages/$pkg/CHANGELOG.md"
            if [ ! -f "$FILE" ]; then
              echo "❌ Missing $FILE"
              exit 1
            fi
            LINES=$(wc -l < "$FILE" | tr -d ' ')
            if [ "$LINES" -lt 3 ]; then
              echo "❌ $FILE appears empty ($LINES lines)"
              exit 1
            fi
            echo "  ✅ $FILE ($LINES lines)"
          done

      - name: Check dependency constraints
        run: |
          echo "Checking cross-package dependency constraints..."
          IFACE_VER=$(grep '^version:' packages/tracelet_platform_interface/pubspec.yaml | awk '{print $2}')
          for pkg in tracelet tracelet_android tracelet_ios tracelet_web; do
            CONSTRAINT=$(grep 'tracelet_platform_interface:' "packages/$pkg/pubspec.yaml" | head -1 | awk '{print $2}')
            echo "  $pkg depends on tracelet_platform_interface: $CONSTRAINT (interface is $IFACE_VER)"
          done
          
          # Verify tracelet_doctor dependency on tracelet
          CORE_VER=$(grep '^version:' packages/tracelet/pubspec.yaml | awk '{print $2}')
          DOCTOR_CONSTRAINT=$(grep 'tracelet:' packages/tracelet_doctor/pubspec.yaml | head -1 | awk '{print $2}')
          echo "  tracelet_doctor depends on tracelet: $DOCTOR_CONSTRAINT (core is $CORE_VER)"
          
          echo "✅ Dependency constraints checked"
