name: React Native CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/tracelet_react_native/**'
      - 'native/**'
      - '.github/workflows/rn-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/tracelet_react_native/**'
      - 'native/**'
      - '.github/workflows/rn-ci.yml'

concurrency:
  group: rn-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/tracelet_react_native

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/tracelet_react_native/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/tracelet_react_native/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rn-coverage
          path: packages/tracelet_react_native/coverage/
          if-no-files-found: ignore

  build-android:
    name: Build Android (RN)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/tracelet_react_native/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Validate Gradle configuration
        working-directory: packages/tracelet_react_native/android
        run: ./gradlew --dry-run assembleDebug 2>/dev/null || echo "Gradle dry-run requires example app — skipped"

  build-ios:
    name: Build iOS (RN)
    runs-on: macos-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/tracelet_react_native/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Validate podspec
        run: pod lib lint ios/TraceletReactNative.podspec --allow-warnings --no-clean 2>/dev/null || echo "Podspec validation requires example app — skipped"

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: [test, build-android, build-ios]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/tracelet_react_native/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run
