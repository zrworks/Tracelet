name: tracelet_example
description: "Unified example demonstrating Tracelet on Android & iOS."
publish_to: 'none'
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  tracelet:
    path: ../packages/tracelet
  tracelet_android:
    path: ../packages/tracelet_android
  tracelet_ios:
    path: ../packages/tracelet_ios
  tracelet_doctor:
    path: ../packages/tracelet_doctor
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false
