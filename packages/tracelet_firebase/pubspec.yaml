name: tracelet_firebase
description: >-
  Firebase adapter for Tracelet. Automatically configures native HTTP sync to push locations directly to the Firebase RTDB and manages background auth token refresh.
version: 3.3.3
topics:
  - firebase
  - location
  - sync
license: Apache-2.0
homepage: https://github.com/Ikolvi/Tracelet
documentation: https://tracelet.ikolvi.com
repository: https://github.com/Ikolvi/Tracelet/tree/main/packages/tracelet_firebase
funding:
  - https://github.com/sponsors/GalacticTitan
  - https://www.buymeacoffee.com/kiranbjm
  - https://thanks.dev/d/gh/galactictitan/dependencies
  - https://www.patreon.com/c/kiranbjm

issue_tracker: https://github.com/Ikolvi/Tracelet/issues
resolution: workspace

environment:
  sdk: '>=3.10.3 <4.0.0'
  flutter: ">=3.22.0"

platforms:
  android:
  ios:
  web:

dependencies:
  flutter:
    sdk: flutter
  tracelet: ^3.3.3
  tracelet_sync: ^3.3.3
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0

  meta: ^1.18.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '6.0.0'
  mocktail: ^1.0.5
  plugin_platform_interface: any
  tracelet_platform_interface: ^3.3.3
