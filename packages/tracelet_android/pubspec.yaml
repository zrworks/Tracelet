name: tracelet_android
description: Android implementation of the Tracelet background geolocation plugin.
version: 3.1.13
license: Apache-2.0
homepage: https://github.com/Ikolvi/Tracelet
repository: https://github.com/Ikolvi/Tracelet/tree/main/packages/tracelet_android
resolution: workspace

environment:
  sdk: ^3.10.3
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  tracelet_platform_interface: ^3.1.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: tracelet
    platforms:
      android:
        package: com.ikolvi.tracelet.flutter
        pluginClass: TraceletAndroidPlugin
        dartPluginClass: TraceletAndroid
