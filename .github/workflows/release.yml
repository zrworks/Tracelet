name: Release (Native SDKs + pub.dev)

# One-click release: publishes Android SDK, iOS SDK, and Flutter packages.
# Prerequisites: versions and changelogs must be updated manually before triggering.
#
# Pipeline:
#   1. Validate   — lint, analyze, dry-run checks
#   2. Android SDK → Maven Central  ┐
#   3. iOS SDK    → CocoaPods       ┘  (parallel)
#   4. Flutter packages → pub.dev      (sequential, dependency order)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build & lint only, don't publish anything)"
        required: false
        type: boolean
        default: false
      skip_native_sdks:
        description: "Skip native SDK publish (use when SDKs are already published)"
        required: false
        type: boolean
        default: false
      skip_flutter:
        description: "Skip Flutter pub.dev publish completely"
        required: false
        type: boolean
        default: false
      publish_core_flutter:
        description: "Publish core tracelet packages"
        required: false
        type: boolean
        default: true
      publish_tracelet_doctor:
        description: "Publish tracelet_doctor package"
        required: false
        type: boolean
        default: true
      publish_tracelet_supabase:
        description: "Publish tracelet_supabase package"
        required: false
        type: boolean
        default: true
      publish_tracelet_firebase:
        description: "Publish tracelet_firebase package"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write  # Required for pub.dev OIDC authentication

concurrency:
  group: release
  cancel-in-progress: false

env:
  FLUTTER_CHANNEL: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────
# Job 1: Pre-flight validation
# ─────────────────────────────────────────────────────────────

jobs:
  validate:
    name: Pre-flight Validation
    runs-on: ubuntu-latest
    outputs:
      android_sdk_version: ${{ steps.versions.outputs.android_sdk }}
      ios_sdk_version: ${{ steps.versions.outputs.ios_sdk }}
      flutter_version: ${{ steps.versions.outputs.flutter }}
      flutter_doctor_version: ${{ steps.versions.outputs.flutter_doctor }}
      flutter_supabase_version: ${{ steps.versions.outputs.flutter_supabase }}
      android_published: ${{ steps.published_status.outputs.android_published }}
      ios_published: ${{ steps.published_status.outputs.ios_published }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdk/rust-core

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y cargo-expand flutter_rust_bridge_codegen

      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate

      - name: Check for uncommitted generated files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Generated files are out of date!"
            echo "Please run 'flutter_rust_bridge_codegen generate' locally and commit the changes."
            git diff
            exit 1
          fi
          echo "✅ Generated files are up to date."

      - name: Upload Rust Bindings
        uses: actions/upload-artifact@v7
        with:
          name: frb-bindings
          path: packages/tracelet_platform_interface/lib/src/rust/
          retention-days: 1

      - name: Bootstrap
        run: melos bootstrap

      - name: Read versions from source
        id: versions
        run: |
          ANDROID_SDK=$(grep '^SDK_VERSION=' sdk/android/gradle.properties | cut -d= -f2)
          IOS_SDK=$(grep "s.version" TraceletSDK.podspec | head -1 | sed "s/.*= '//;s/'//;s/ //g")
          FLUTTER=$(grep '^version:' packages/tracelet/pubspec.yaml | awk '{print $2}')
          FLUTTER_DOCTOR=$(grep '^version:' packages/tracelet_doctor/pubspec.yaml | awk '{print $2}')
          FLUTTER_SUPABASE=$(grep '^version:' packages/tracelet_supabase/pubspec.yaml | awk '{print $2}')
          FLUTTER_FIREBASE=$(grep '^version:' packages/tracelet_firebase/pubspec.yaml | awk '{print $2}')

          echo "android_sdk=$ANDROID_SDK" >> "$GITHUB_OUTPUT"
          echo "ios_sdk=$IOS_SDK" >> "$GITHUB_OUTPUT"
          echo "flutter=$FLUTTER" >> "$GITHUB_OUTPUT"
          echo "flutter_doctor=$FLUTTER_DOCTOR" >> "$GITHUB_OUTPUT"
          echo "flutter_supabase=$FLUTTER_SUPABASE" >> "$GITHUB_OUTPUT"
          echo "flutter_firebase=$FLUTTER_FIREBASE" >> "$GITHUB_OUTPUT"

          echo "## Versions to publish" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android SDK | \`$ANDROID_SDK\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS SDK | \`$IOS_SDK\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter core packages | \`$FLUTTER\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter doctor package | \`$FLUTTER_DOCTOR\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter supabase package | \`$FLUTTER_SUPABASE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter firebase package | \`$FLUTTER_FIREBASE\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate mock env for examples
        run: |
          echo "const supabaseUrl = 'https://dummy.supabase.co';" > example_supabase/lib/env.dart
          echo "const supabaseAnonKey = 'dummy';" >> example_supabase/lib/env.dart

      - name: Check published status
        id: published_status
        run: |
          ANDROID_VERSION="${{ steps.versions.outputs.android_sdk }}"
          CORE_URL="https://repo1.maven.org/maven2/com/ikolvi/tracelet-sdk/${ANDROID_VERSION}/tracelet-sdk-${ANDROID_VERSION}.pom"
          SYNC_URL="https://repo1.maven.org/maven2/com/ikolvi/tracelet-sync-sdk/${ANDROID_VERSION}/tracelet-sync-sdk-${ANDROID_VERSION}.pom"
          CORE_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$CORE_URL")
          SYNC_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SYNC_URL")
          if [ "$CORE_CODE" = "200" ] && [ "$SYNC_CODE" = "200" ]; then
            echo "android_published=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Android SDK already published."
          else
            echo "android_published=false" >> "$GITHUB_OUTPUT"
          fi

          IOS_VERSION=$(grep '^version:' packages/tracelet_ios/pubspec.yaml | awk '{print $2}')
          SYNC_VERSION=$(grep '^version:' packages/tracelet_sync/pubspec.yaml | awk '{print $2}')
          IOS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/tracelet_ios/versions/${IOS_VERSION}")
          SYNC_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/tracelet_sync/versions/${SYNC_VERSION}")
          if [ "$IOS_CODE" = "200" ] && [ "$SYNC_CODE" = "200" ]; then
            echo "ios_published=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ iOS SDK packages already published."
          else
            echo "ios_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze
        run: melos run analyze
      - name: Dry-run pub publish
        run: |
          ORDERED=""
          if [ "${{ inputs.publish_core_flutter }}" = "true" ]; then
            ORDERED="tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet tracelet_sync"
          fi
          if [ "${{ inputs.publish_tracelet_supabase }}" = "true" ]; then ORDERED="$ORDERED tracelet_supabase"; fi
          if [ "${{ inputs.publish_tracelet_firebase }}" = "true" ]; then ORDERED="$ORDERED tracelet_firebase"; fi
          if [ "${{ inputs.publish_tracelet_doctor }}" = "true" ]; then ORDERED="$ORDERED tracelet_doctor"; fi
          for pkg in $ORDERED; do
            echo "── Dry-run: $pkg ──"
            cd "packages/${pkg}"
            flutter pub publish --dry-run || true
            cd "${{ github.workspace }}"
          done

  # ─────────────────────────────────────────────────────────────
  # Job 2: Publish Android SDK to Maven Central
  # ─────────────────────────────────────────────────────────────
  publish-android-sdk:
    name: Publish Android SDK
    needs: [validate, test-flutter-android]
    if: |
      always() &&
      !inputs.skip_native_sdks &&
      needs.validate.result == 'success' &&
      (needs.test-flutter-android.result == 'success' || needs.test-flutter-android.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        working-directory: sdk/android
        run: |
          VERSION=$(grep '^SDK_VERSION=' gradle.properties | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Android SDK version: $VERSION"

          if echo "$VERSION" | grep -q "SNAPSHOT"; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if already published
        id: check_published
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Check both artifacts — only skip if BOTH are already published
          CORE_URL="https://repo1.maven.org/maven2/com/ikolvi/tracelet-sdk/${VERSION}/tracelet-sdk-${VERSION}.pom"
          SYNC_URL="https://repo1.maven.org/maven2/com/ikolvi/tracelet-sync-sdk/${VERSION}/tracelet-sync-sdk-${VERSION}.pom"
          CORE_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$CORE_URL")
          SYNC_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SYNC_URL")
          if [ "$CORE_CODE" = "200" ] && [ "$SYNC_CODE" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Both tracelet-sdk and tracelet-sync-sdk v$VERSION already exist on Maven Central — skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "📦 Will publish: tracelet-sdk ($CORE_CODE), tracelet-sync-sdk ($SYNC_CODE)"
          fi

      - name: Setup Rust
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android
      - name: Cache Rust
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdk/rust-core
      - name: Install cargo-ndk
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        run: cargo install cargo-ndk
      - name: Build Android Rust Core
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        run: ./sdk/rust-core/build-android.sh

      - name: Verify FRB Symbols in Android native library
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        run: |
          SO="sdk/android/tracelet-sdk/src/main/jniLibs/arm64-v8a/libtracelet_core.so"
          if ! nm -D "$SO" | grep -q "frbgen_tracelet"; then
            echo "❌ ERROR: flutter_rust_bridge symbols missing from Android .so!"
            exit 1
          fi
          COUNT=$(nm -D "$SO" | grep -c "frbgen_tracelet")
          echo "✅ Verified $COUNT frbgen_tracelet symbols present in $SO"

      - name: Build release AARs
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        working-directory: sdk/android
        run: ./gradlew :tracelet-sdk:assembleRelease :tracelet-sync-sdk:assembleRelease

      - name: Build Host Rust Library for Tests
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        working-directory: sdk/rust-core
        run: cargo build

      - name: Run unit tests
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        working-directory: sdk/android
        run: ./gradlew :tracelet-sdk:testReleaseUnitTest :tracelet-sync-sdk:testReleaseUnitTest

      - name: Publish to local Maven (dry run)
        if: ${{ inputs.dry_run && steps.check_published.outputs.already_published == 'false' }}
        working-directory: sdk/android
        run: |
          ./gradlew :tracelet-sdk:publishReleasePublicationToMavenLocal :tracelet-sync-sdk:publishReleasePublicationToMavenLocal
          echo "📦 Artifacts in local Maven:"
          find ~/.m2/repository/com/ikolvi/tracelet-sdk -type f | sort
          echo "---"
          find ~/.m2/repository/com/ikolvi/tracelet-sync-sdk -type f | sort

      - name: Publish to Maven Central
        if: ${{ !inputs.dry_run && steps.version.outputs.is_snapshot == 'false' && steps.check_published.outputs.already_published == 'false' }}
        working-directory: sdk/android
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository

      - name: Publish snapshot
        if: ${{ !inputs.dry_run && steps.version.outputs.is_snapshot == 'true' && steps.check_published.outputs.already_published == 'false' }}
        working-directory: sdk/android
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToSonatype

      - name: Tag Android SDK
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="sdk-android-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ℹ️ Tag $TAG already exists — skipping"
          else
            git tag "$TAG" -m "Android SDK v${VERSION}"
            git push origin "$TAG"
          fi

      - name: Summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Android SDK" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Core** | \`com.ikolvi:tracelet-sdk:${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Sync** | \`com.ikolvi:tracelet-sync-sdk:${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dry Run** | ${{ inputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build iOS SDK (For pub.dev bundling)
  # ─────────────────────────────────────────────────────────────
  publish-ios-sdk:
    name: Publish iOS SDK
    needs: [validate, test-flutter-ios]
    if: |
      always() &&
      !inputs.skip_native_sdks &&
      needs.validate.result == 'success' &&
      (needs.test-flutter-ios.result == 'success' || needs.test-flutter-ios.result == 'skipped')
    runs-on: macos-latest
    outputs:
      already_published: ${{ steps.check_published.outputs.already_published }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION=$(grep '^version:' packages/tracelet_ios/pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 iOS Flutter Plugin version: $VERSION"

      - name: Check if already published
        id: check_published
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/tracelet_ios/versions/${VERSION}")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Version $VERSION of tracelet_ios already exists on pub.dev — skipping iOS SDK build"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "📦 Version $VERSION not found on pub.dev — will build"
          fi

      - name: Setup Rust
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios
      - name: Cache Rust
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdk/rust-core
      - name: Build iOS Rust Core
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        run: ./sdk/rust-core/build-ios.sh

      - name: Build SDK (SPM)
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        run: |
          swift build -Xswiftc -suppress-warnings 2>&1 || true
          echo "ℹ️ SPM build check complete"

      - name: Run SDK tests
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        run: |
          swift test 2>&1 || true
          echo "ℹ️ SDK tests complete"

      - name: Build and Zip XCFramework
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        run: |
          echo "Creating XCFramework zip..."
          cd sdk/rust-core/out
          zip -r TraceletCore.xcframework.zip TraceletCore.xcframework
          zip -r TraceletSyncFFI.xcframework.zip TraceletSyncFFI.xcframework
          cd ../../..

      - name: Upload iOS SDK Artifacts
        if: ${{ steps.check_published.outputs.already_published == 'false' }}
        uses: actions/upload-artifact@v7
        with:
          name: ios-sdk-artifacts
          path: |
            sdk/rust-core/out/TraceletCore.xcframework.zip
            sdk/rust-core/out/TraceletSyncFFI.xcframework.zip
            sdk/ios/Sources/TraceletSDK/
          retention-days: 1

      - name: Summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## iOS SDK" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | \`Bundled for pub.dev\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dry Run** | ${{ inputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"


  # ─────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────
  # Job: Test Flutter Android Bundle (pre-publish verification)
  # ─────────────────────────────────────────────────────────────
  test-flutter-android:
    name: Test Bundled Android Plugin
    needs: validate
    if: |
      always() &&
      !inputs.skip_flutter &&
      !inputs.skip_native_sdks &&
      needs.validate.result == 'success' &&
      needs.validate.outputs.android_published == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Melos
        run: dart pub global activate melos
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdk/rust-core
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install flutter_rust_bridge_codegen & cargo-ndk
        run: |
          cargo binstall -y cargo-expand flutter_rust_bridge_codegen
          cargo binstall -y cargo-ndk
      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate
      - name: Bootstrap
        run: melos bootstrap
      - name: Build Android Rust Core
        run: ./sdk/rust-core/build-android.sh
      - name: Build example APK
        working-directory: example
        run: flutter build apk --release
      - name: Verify FRB Symbols in Release APK
        working-directory: example
        run: |
          unzip -q -o build/app/outputs/flutter-apk/app-release.apk -d extracted_apk
          SO="extracted_apk/lib/arm64-v8a/libtracelet_core.so"
          if ! nm -D "$SO" | grep -q "frbgen_tracelet"; then
            echo "❌ ERROR: flutter_rust_bridge symbols were stripped from the Android Release APK!"
            exit 1
          fi
          COUNT=$(nm -D "$SO" | grep -c "frbgen_tracelet")
          echo "✅ Verified $COUNT frbgen_tracelet symbols present in the APK"

  # ─────────────────────────────────────────────────────────────
  # Job: Test Flutter iOS Bundle (pre-publish verification)
  # ─────────────────────────────────────────────────────────────
  test-flutter-ios:
    name: Test Bundled iOS Plugin
    needs: validate
    if: |
      always() &&
      !inputs.skip_flutter &&
      !inputs.skip_native_sdks &&
      needs.validate.result == 'success' &&
      needs.validate.outputs.ios_published == 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Download Rust Bindings
        uses: actions/download-artifact@v8
        with:
          name: frb-bindings
          path: packages/tracelet_platform_interface/lib/src/rust/

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdk/rust-core
      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y cargo-expand flutter_rust_bridge_codegen
      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate
      - name: Install Melos
        run: dart pub global activate melos
      - name: Bootstrap
        run: melos bootstrap
      - name: Build iOS Rust Core
        run: ./sdk/rust-core/build-ios.sh

      - name: Package SDK as XCFramework
        run: |
          echo "Packaging SDK..."
          cd sdk/rust-core/out
          zip -r TraceletCore.xcframework.zip TraceletCore.xcframework
          zip -r TraceletSyncFFI.xcframework.zip TraceletSyncFFI.xcframework
          cd ../../..

      - name: Bundle iOS SDK into tracelet_ios
        run: |
          echo "Bundling iOS SDK into tracelet_ios plugin..."
          mkdir -p packages/tracelet_ios/ios/tracelet_ios/Frameworks
          unzip -q -o sdk/rust-core/out/TraceletCore.xcframework.zip -d packages/tracelet_ios/ios/tracelet_ios/Frameworks/
          
          mkdir -p packages/tracelet_ios/ios/tracelet_ios/Sources/tracelet_ios/TraceletSDK
          cp -r sdk/ios/Sources/TraceletSDK/* packages/tracelet_ios/ios/tracelet_ios/Sources/tracelet_ios/TraceletSDK/
          
          echo "Patching tracelet_ios.podspec..."
          perl -pi -e 's/s\.dependency '\''TraceletSDK'\''.*/s.vendored_frameworks = '\''tracelet_ios\/Frameworks\/TraceletCore.xcframework'\''/g' packages/tracelet_ios/ios/tracelet_ios.podspec
          
          echo "Patching tracelet_ios/Package.swift for SPM..."
          perl -pi -e 's/.*\.package\(url: "https:\/\/github.com\/Ikolvi\/Tracelet.git".*//g' packages/tracelet_ios/ios/tracelet_ios/Package.swift
          perl -pi -e 's/\.product\(name: "TraceletSDK", package: "Tracelet"\)/"TraceletCore"/g' packages/tracelet_ios/ios/tracelet_ios/Package.swift
          perl -pi -e 's/        \)/        ),\n        .binaryTarget(name: "TraceletCore", path: "Frameworks\/TraceletCore.xcframework")/g' packages/tracelet_ios/ios/tracelet_ios/Package.swift

      - name: Bundle iOS SDK into tracelet_sync
        run: |
          echo "Bundling iOS SDK into tracelet_sync plugin..."
          mkdir -p packages/tracelet_sync/ios/tracelet_sync/TraceletSyncFFI.xcframework
          unzip -q -o sdk/rust-core/out/TraceletSyncFFI.xcframework.zip -d packages/tracelet_sync/ios/tracelet_sync/
          
          perl -pi -e 's/.*\.package\(url: "https:\/\/github.com\/Ikolvi\/Tracelet.git".*//g' packages/tracelet_sync/ios/tracelet_sync/Package.swift 2>/dev/null || true
          perl -pi -e 's/\.product\(name: "TraceletSDK", package: "Tracelet"\)//g' packages/tracelet_sync/ios/tracelet_sync/Package.swift 2>/dev/null || true

      - name: Build example iOS
        working-directory: example
        run: |
          # Remove TraceletSDK from example Podfile since it's now vendored in tracelet_ios
          perl -pi -e 's/pod '\''TraceletSDK'\''.*//g' ios/Podfile
          rm -f ios/Podfile.lock
          flutter build ios --no-codesign --release

      - name: Verify FRB Symbols are not stripped
        working-directory: example
        run: |
          echo "Extracting expected FRB symbols from static library..."
          EXPECTED_SYMBOLS=$(nm -g ../sdk/rust-core/target/aarch64-apple-ios/release/libtracelet_core.a 2>/dev/null | grep -E " T _frb| T _store_dart" | awk '{print $3}' | sed 's/^_//' | sort | uniq)
          
          echo "Dumping Runner symbols..."
          nm -g build/ios/iphoneos/Runner.app/Runner > runner_symbols.txt
          
          echo "Verifying symbols in Release build..."
          MISSING_SYMBOLS=0
          for symbol in $EXPECTED_SYMBOLS; do
            if ! grep -q "$symbol" runner_symbols.txt; then
              echo "❌ ERROR: Symbol $symbol was stripped from the iOS Release build!"
              MISSING_SYMBOLS=$((MISSING_SYMBOLS + 1))
            fi
          done
          
          if [ "$MISSING_SYMBOLS" -gt 0 ]; then
            echo "❌ $MISSING_SYMBOLS symbols were stripped!"
            exit 1
          else
            echo "✅ All flutter_rust_bridge symbols successfully preserved!"
          fi

  # Job 4: Publish Flutter packages to pub.dev (dependency order)
  # ─────────────────────────────────────────────────────────────
  publish-flutter:
    name: Publish Flutter packages
    needs:
      - validate
      - publish-android-sdk
      - publish-ios-sdk
      - test-flutter-ios
      - test-flutter-android
    # Run if native SDKs succeeded OR were skipped
    if: |
      always() &&
      !inputs.skip_flutter &&
      (needs.publish-android-sdk.result == 'success' || needs.publish-android-sdk.result == 'skipped') &&
      (needs.publish-ios-sdk.result == 'success' || needs.publish-ios-sdk.result == 'skipped') &&
      (needs.test-flutter-ios.result == 'success' || needs.test-flutter-ios.result == 'skipped') &&
      (needs.test-flutter-android.result == 'success' || needs.test-flutter-android.result == 'skipped') &&
      needs.validate.result == 'success'
    runs-on: ubuntu-latest
    environment: pub.dev  # OIDC automated publishing
    permissions:
      contents: write
      id-token: write  # Required for pub.dev OIDC token exchange
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdk/rust-core

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y cargo-expand flutter_rust_bridge_codegen

      - name: Generate Rust Bindings
        working-directory: packages/tracelet_platform_interface
        run: flutter_rust_bridge_codegen generate

      - name: Remove generated files from .gitignore for publishing
        run: |
          sed -i '/frb_generated/d' .gitignore
          sed -i '/lib\/src\/rust/d' .gitignore
          sed -i '/\*\.xcframework/d' .gitignore
          sed -i '/\*\.a/d' .gitignore
          sed -i '/\*\.h/d' .gitignore

      - name: Bootstrap
        run: melos bootstrap

      - name: Read Flutter version
        id: version
        run: |
          VERSION=$(grep '^version:' packages/tracelet/pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download iOS SDK Artifacts
        if: ${{ !inputs.skip_native_sdks && needs.publish-ios-sdk.outputs.already_published == 'false' }}
        uses: actions/download-artifact@v8
        with:
          name: ios-sdk-artifacts
          path: tracelet-ios-temp

      - name: Bundle iOS SDK into tracelet_ios
        if: ${{ !inputs.skip_native_sdks && needs.publish-ios-sdk.outputs.already_published == 'false' }}
        run: |
          echo "Bundling iOS SDK into tracelet_ios plugin..."
          mkdir -p packages/tracelet_ios/ios/tracelet_ios/Frameworks
          unzip -q -o tracelet-ios-temp/rust-core/out/TraceletCore.xcframework.zip -d packages/tracelet_ios/ios/tracelet_ios/Frameworks/
          
          mkdir -p packages/tracelet_ios/ios/tracelet_ios/Sources/tracelet_ios/TraceletSDK
          cp -r tracelet-ios-temp/ios/Sources/TraceletSDK/* packages/tracelet_ios/ios/tracelet_ios/Sources/tracelet_ios/TraceletSDK/
          
          echo "Patching tracelet_ios.podspec..."
          perl -pi -e 's/s\.dependency '\''TraceletSDK'\''.*/s.vendored_frameworks = '\''tracelet_ios\/Frameworks\/TraceletCore.xcframework'\''/g' packages/tracelet_ios/ios/tracelet_ios.podspec
          
          echo "Patching tracelet_ios/Package.swift for SPM..."
          perl -pi -e 's/.*\.package\(url: "https:\/\/github.com\/Ikolvi\/Tracelet.git".*//g' packages/tracelet_ios/ios/tracelet_ios/Package.swift
          perl -pi -e 's/\.product\(name: "TraceletSDK", package: "Tracelet"\)/"TraceletCore"/g' packages/tracelet_ios/ios/tracelet_ios/Package.swift
          perl -pi -e 's/        \)/        ),\n        .binaryTarget(name: "TraceletCore", path: "Frameworks\/TraceletCore.xcframework")/g' packages/tracelet_ios/ios/tracelet_ios/Package.swift

          
          echo "✅ iOS Bundle complete. tracelet_ios now contains pre-compiled Rust Core."

      - name: Bundle iOS SDK into tracelet_sync
        if: ${{ !inputs.skip_native_sdks && needs.publish-ios-sdk.outputs.already_published == 'false' }}
        run: |
          echo "Bundling iOS SDK into tracelet_sync plugin..."
          mkdir -p packages/tracelet_sync/ios/tracelet_sync/TraceletSyncFFI.xcframework
          unzip -q -o tracelet-ios-temp/rust-core/out/TraceletSyncFFI.xcframework.zip -d packages/tracelet_sync/ios/tracelet_sync/
          
          perl -pi -e 's/.*\.package\(url: "https:\/\/github.com\/Ikolvi\/Tracelet.git".*//g' packages/tracelet_sync/ios/tracelet_sync/Package.swift 2>/dev/null || true
          perl -pi -e 's/\.product\(name: "TraceletSDK", package: "Tracelet"\)//g' packages/tracelet_sync/ios/tracelet_sync/Package.swift 2>/dev/null || true
          
          echo "✅ iOS Bundle complete. tracelet_sync now contains pre-compiled TraceletSyncFFI."

      # ── Setup pub.dev credentials ──
      - name: Setup pub.dev credentials
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p "$HOME/.config/dart"
          echo '${{ secrets.PUB_CREDENTIALS }}' > "$HOME/.config/dart/pub-credentials.json"

      # ── Publish (dependency order) ──
      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        run: |
          # Publish order: platform_interface → android, ios, web → tracelet
          ORDERED=""
          if [ "${{ inputs.publish_core_flutter }}" = "true" ]; then
            ORDERED="tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet tracelet_sync"
          fi
          if [ "${{ inputs.publish_tracelet_supabase }}" = "true" ]; then ORDERED="$ORDERED tracelet_supabase"; fi
          if [ "${{ inputs.publish_tracelet_firebase }}" = "true" ]; then ORDERED="$ORDERED tracelet_firebase"; fi
          if [ "${{ inputs.publish_tracelet_doctor }}" = "true" ]; then ORDERED="$ORDERED tracelet_doctor"; fi

          for pkg in $ORDERED; do
            echo "══════════════════════════════════════"
            echo "📤 Publishing $pkg..."
            echo "══════════════════════════════════════"
            
            PKG_VERSION=$(grep '^version:' "packages/${pkg}/pubspec.yaml" | awk '{print $2}')
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/${pkg}/versions/${PKG_VERSION}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "ℹ️ $pkg v$PKG_VERSION is already published on pub.dev! Skipping..."
              continue
            fi
            
            cd "packages/${pkg}"
            dart pub publish --force
            cd "${{ github.workspace }}"
            # Wait for pub.dev to index before publishing dependents
            echo "⏳ Waiting 30s for pub.dev indexing..."
            sleep 30
          done

      # ── Tag Flutter packages ──
      - name: Create Flutter tags
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CREATED=0
          NEW_TAGS=""

          if [ "${{ inputs.publish_core_flutter }}" = "true" ]; then
            PACKAGES="tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet tracelet_sync"
            for pkg in $PACKAGES; do
              TAG="${pkg}-v${VERSION}"
              if git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "ℹ️ Tag $TAG already exists — skipping"
              else
                git tag "$TAG" -m "Release ${pkg} v${VERSION}"
                echo "🏷️ Tagged: $TAG"
                CREATED=$((CREATED + 1))
                NEW_TAGS="$NEW_TAGS $TAG"
              fi
            done
          fi

          if [ "${{ inputs.publish_tracelet_supabase }}" = "true" ]; then
            SUPABASE_VERSION=$(grep '^version:' packages/tracelet_supabase/pubspec.yaml | awk '{print $2}')
            SUPABASE_TAG="tracelet_supabase-v${SUPABASE_VERSION}"
            if git rev-parse "$SUPABASE_TAG" >/dev/null 2>&1; then
              echo "ℹ️ Tag $SUPABASE_TAG already exists — skipping"
            else
              git tag "$SUPABASE_TAG" -m "Release tracelet_supabase v${SUPABASE_VERSION}"
              echo "🏷️ Tagged: $SUPABASE_TAG"
              CREATED=$((CREATED + 1))
              NEW_TAGS="$NEW_TAGS $SUPABASE_TAG"
            fi
          fi

          if [ "${{ inputs.publish_tracelet_firebase }}" = "true" ]; then
            FIREBASE_VERSION=$(grep '^version:' packages/tracelet_firebase/pubspec.yaml | awk '{print $2}')
            FIREBASE_TAG="tracelet_firebase-v${FIREBASE_VERSION}"
            if git rev-parse "$FIREBASE_TAG" >/dev/null 2>&1; then
              echo "ℹ️ Tag $FIREBASE_TAG already exists — skipping"
            else
              git tag "$FIREBASE_TAG" -m "Release tracelet_firebase v${FIREBASE_VERSION}"
              echo "🏷️ Tagged: $FIREBASE_TAG"
              CREATED=$((CREATED + 1))
              NEW_TAGS="$NEW_TAGS $FIREBASE_TAG"
            fi
          fi

          if [ "${{ inputs.publish_tracelet_doctor }}" = "true" ]; then
            DOCTOR_VERSION=$(grep '^version:' packages/tracelet_doctor/pubspec.yaml | awk '{print $2}')
            DOCTOR_TAG="tracelet_doctor-v${DOCTOR_VERSION}"
            if git rev-parse "$DOCTOR_TAG" >/dev/null 2>&1; then
              echo "ℹ️ Tag $DOCTOR_TAG already exists — skipping"
            else
              git tag "$DOCTOR_TAG" -m "Release tracelet_doctor v${DOCTOR_VERSION}"
              echo "🏷️ Tagged: $DOCTOR_TAG"
              CREATED=$((CREATED + 1))
              NEW_TAGS="$NEW_TAGS $DOCTOR_TAG"
            fi
          fi

          if [ "$CREATED" -gt 0 ]; then
            git push origin $NEW_TAGS
          else
            echo "ℹ️ All tags already existed — no push needed"
          fi

      - name: Dry-run publish
        if: inputs.dry_run
        run: |
          ORDERED=""
          if [ "${{ inputs.publish_core_flutter }}" = "true" ]; then
            ORDERED="tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet tracelet_sync"
          fi
          if [ "${{ inputs.publish_tracelet_supabase }}" = "true" ]; then ORDERED="$ORDERED tracelet_supabase"; fi
          if [ "${{ inputs.publish_tracelet_firebase }}" = "true" ]; then ORDERED="$ORDERED tracelet_firebase"; fi
          if [ "${{ inputs.publish_tracelet_doctor }}" = "true" ]; then ORDERED="$ORDERED tracelet_doctor"; fi
          for pkg in $ORDERED; do
            echo "── Dry-run: $pkg ──"
            cd "packages/${pkg}"
            dart pub publish --dry-run || true
            cd "${{ github.workspace }}"
          done

      - name: Summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Flutter Packages" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.publish_core_flutter }}" = "true" ]; then
            PACKAGES="tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet tracelet_sync"
            for pkg in $PACKAGES; do
              echo "| \`$pkg\` | $VERSION |" >> "$GITHUB_STEP_SUMMARY"
            done
          fi
          
          if [ "${{ inputs.publish_tracelet_supabase }}" = "true" ]; then
            SUPABASE_VERSION=$(grep '^version:' packages/tracelet_supabase/pubspec.yaml | awk '{print $2}')
            echo "| \`tracelet_supabase\` | $SUPABASE_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ inputs.publish_tracelet_firebase }}" = "true" ]; then
            FIREBASE_VERSION=$(grep '^version:' packages/tracelet_firebase/pubspec.yaml | awk '{print $2}')
            echo "| \`tracelet_firebase\` | $FIREBASE_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ inputs.publish_tracelet_doctor }}" = "true" ]; then
            DOCTOR_VERSION=$(grep '^version:' packages/tracelet_doctor/pubspec.yaml | awk '{print $2}')
            echo "| \`tracelet_doctor\` | $DOCTOR_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🔍 **Dry run — nothing was published.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **All packages published to pub.dev.**" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 5: Final summary
  # ─────────────────────────────────────────────────────────────
  summary:
    name: Release Summary
    needs:
      - validate
      - publish-android-sdk
      - publish-ios-sdk
      - publish-flutter
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Version | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android SDK | \`${{ needs.validate.outputs.android_sdk_version }}\` | ${{ needs.publish-android-sdk.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS SDK | \`${{ needs.validate.outputs.ios_sdk_version }}\` | ${{ needs.publish-ios-sdk.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter core packages | \`${{ needs.validate.outputs.flutter_version }}\` | ${{ needs.publish-flutter.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter doctor package | \`${{ needs.validate.outputs.flutter_doctor_version }}\` | ${{ needs.publish-flutter.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flutter supabase package | \`${{ needs.validate.outputs.flutter_supabase_version }}\` | ${{ needs.publish-flutter.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🔍 **This was a dry run. Nothing was published.**" >> "$GITHUB_STEP_SUMMARY"
          fi
