name: tracelet_workspace
publish_to: none

environment:
  sdk: ^3.10.3

workspace:
  - packages/tracelet
  - packages/tracelet_platform_interface
  - packages/tracelet_android
  - packages/tracelet_ios
  - packages/tracelet_web
  - packages/tracelet_doctor
  - packages/tracelet_supabase
  - packages/tracelet_supabase/example
  - example

dev_dependencies:
  melos: ^7.0.0

melos:
  repository: https://github.com/Ikolvi/Tracelet

  ide:
    intellij: false

  command:
    version:
      linkToCommits: true
      workspaceChangelog: true

  scripts:
    analyze:
      description: Run dart analyze across all packages
      run: dart analyze --fatal-infos .
      exec:
        concurrency: 4

    format:
      description: Check formatting across all packages
      run: dart format --set-exit-if-changed .
      exec:
        concurrency: 4

    format:fix:
      description: Fix formatting across all packages
      run: dart format .
      exec:
        concurrency: 4

    test:
      description: Run tests across all packages
      run: flutter test --coverage
      packageFilters:
        dirExists: test
      exec:
        concurrency: 1
        failFast: true

    test:dart:
      description: Run Dart-only tests (no Flutter)
      run: dart test
      packageFilters:
        dirExists: test
        noDependsOn: flutter
      exec:
        concurrency: 1

    pigeon:
      description: Generate Pigeon API bindings
      run: dart run pigeon --input pigeons/tracelet_api.dart
      packageFilters:
        scope: tracelet_platform_interface

    clean:
      description: Clean all packages
      run: flutter clean
      exec:
        concurrency: 4

    pub:get:
      description: Run pub get across all packages
      run: flutter pub get
      exec:
        concurrency: 4

    build:example:android:
      description: Build example app for Android
      run: flutter build apk --debug
      packageFilters:
        scope: tracelet_example
        dirExists: lib

    build:example:ios:
      description: Build example app for iOS
      run: flutter build ios --no-codesign --debug
      packageFilters:
        scope: tracelet_example
        dirExists: lib

    build:example:web:
      description: Build example app for Web
      run: flutter build web
      packageFilters:
        scope: tracelet_example
        dirExists: lib

    coverage:
      description: Generate coverage report
      run: |
        flutter test --coverage
        genhtml coverage/lcov.info -o coverage/html
      packageFilters:
        dirExists: test
      exec:
        concurrency: 1

    benchmark:
      description: Run performance benchmarks
      run: cd benchmark && flutter pub get && flutter test test/tracelet_benchmark_test.dart --reporter expanded
