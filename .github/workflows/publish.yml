name: Publish to pub.dev

# Trigger: manual dispatch with version bump type
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      packages:
        description: "Packages to publish (comma-separated, or 'all')"
        required: true
        default: "all"
        type: string
      dry_run:
        description: "Dry run (validate without publishing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write  # Required for pub.dev OIDC authentication

concurrency:
  group: publish
  cancel-in-progress: false

env:
  FLUTTER_CHANNEL: stable

jobs:
  publish:
    name: Bump, Commit & Publish
    runs-on: ubuntu-latest
    environment: pub.dev  # OIDC automated publishing
    permissions:
      contents: write
      id-token: write  # Required for pub.dev OIDC token exchange
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      # ── Determine which packages to publish ──
      - name: Resolve packages
        id: resolve
        run: |
          INPUT="${{ inputs.packages }}"
          if [ "$INPUT" = "all" ]; then
            echo "packages=tracelet_platform_interface,tracelet_android,tracelet_ios,tracelet_web,tracelet" >> "$GITHUB_OUTPUT"
          else
            echo "packages=$INPUT" >> "$GITHUB_OUTPUT"
          fi

      # ── Bump versions, update changelogs, update cross-deps ──
      - name: Bump versions
        run: |
          set -euo pipefail
          BUMP="${{ inputs.bump }}"
          PACKAGES="${{ steps.resolve.outputs.packages }}"

          bump_version() {
            local current="$1"
            local type="$2"
            IFS='.' read -r major minor patch <<< "$current"
            case "$type" in
              major) echo "$((major + 1)).0.0" ;;
              minor) echo "${major}.$((minor + 1)).0" ;;
              patch) echo "${major}.${minor}.$((patch + 1))" ;;
            esac
          }

          IFS=',' read -ra PKG_ARRAY <<< "$PACKAGES"

          declare -A NEW_VERSIONS

          # Pass 1: Bump version in each package's pubspec.yaml and CHANGELOG.md
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)  # trim whitespace
            PUBSPEC="packages/${pkg}/pubspec.yaml"
            CHANGELOG="packages/${pkg}/CHANGELOG.md"

            if [ ! -f "$PUBSPEC" ]; then
              echo "::error::pubspec.yaml not found for package '$pkg'"
              exit 1
            fi

            CURRENT=$(grep '^version:' "$PUBSPEC" | head -1 | awk '{print $2}')
            NEW=$(bump_version "$CURRENT" "$BUMP")
            NEW_VERSIONS[$pkg]="$NEW"

            echo "📦 $pkg: $CURRENT → $NEW"

            # Update pubspec.yaml version
            sed -i "s/^version: ${CURRENT}/version: ${NEW}/" "$PUBSPEC"

            # Update podspec if it exists (tracelet_ios)
            PODSPEC="packages/${pkg}/ios/${pkg}.podspec"
            if [ -f "$PODSPEC" ]; then
              sed -i "s/s\.version *= *'[^']*'/s.version          = '${NEW}'/" "$PODSPEC"
              echo "  ↳ Updated podspec"
            fi
          done

          # Pass 2: Update cross-package dependency constraints
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            PUBSPEC="packages/${pkg}/pubspec.yaml"

            for dep in "${!NEW_VERSIONS[@]}"; do
              if [ "$dep" != "$pkg" ]; then
                DEP_VER="${NEW_VERSIONS[$dep]}"
                # Extract major.minor for caret constraint
                DEP_CARET="^$(echo "$DEP_VER" | cut -d. -f1-2).0"
                # Only update if the dependency exists in this pubspec
                if grep -q "  ${dep}:" "$PUBSPEC"; then
                  sed -i "s/  ${dep}: \^[0-9][0-9.]*/  ${dep}: ^${DEP_VER}/" "$PUBSPEC"
                  echo "  ↳ $pkg: updated $dep constraint to ^${DEP_VER}"
                fi
              fi
            done
          done

          # Export for later steps
          echo "new_versions<<EOF" >> "$GITHUB_OUTPUT"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            echo "${pkg}=${NEW_VERSIONS[$pkg]}"
          done
          echo "EOF" >> "$GITHUB_OUTPUT"
        id: bump

      - name: Bootstrap (post-bump)
        run: melos bootstrap

      # ── Validate ──
      - name: Analyze
        run: melos run analyze

      - name: Dry-run publish
        if: inputs.dry_run
        run: |
          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.resolve.outputs.packages }}"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            echo "── Dry-run: $pkg ──"
            cd "packages/${pkg}"
            flutter pub publish --dry-run || true
            cd "${{ github.workspace }}"
          done

      # ── Commit & Tag ──
      - name: Commit version bump
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump versions (${{ inputs.bump }})"

      - name: Create tags
        if: ${{ !inputs.dry_run }}
        run: |
          IFS=',' read -ra PKG_ARRAY <<< "${{ steps.resolve.outputs.packages }}"
          while IFS= read -r line; do
            PKG="${line%%=*}"
            VER="${line#*=}"
            TAG="${PKG}-v${VER}"
            git tag "$TAG" -m "Release ${PKG} v${VER}"
            echo "🏷️ Tagged: $TAG"
          done <<< "${{ steps.bump.outputs.new_versions }}"

      - name: Push commit & tags
        if: ${{ !inputs.dry_run }}
        run: git push origin main --tags

      # ── Publish (dependency order) ──
      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        run: |
          # Publish order: platform_interface → android → ios → tracelet
          ORDERED="tracelet_platform_interface tracelet_android tracelet_ios tracelet_web tracelet"
          IFS=',' read -ra REQUESTED <<< "${{ steps.resolve.outputs.packages }}"

          for pkg in $ORDERED; do
            # Only publish if it was requested
            for req in "${REQUESTED[@]}"; do
              req=$(echo "$req" | xargs)
              if [ "$pkg" = "$req" ]; then
                echo "══════════════════════════════════════"
                echo "📤 Publishing $pkg..."
                echo "══════════════════════════════════════"
                cd "packages/${pkg}"
                flutter pub publish --force
                cd "${{ github.workspace }}"
                # Wait for pub.dev to index before publishing dependents
                echo "⏳ Waiting 30s for pub.dev indexing..."
                sleep 30
                break
              fi
            done
          done

      # ── Summary ──
      - name: Summary
        if: always()
        run: |
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            PKG="${line%%=*}"
            VER="${line#*=}"
            echo "| \`$PKG\` | $VER |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "${{ steps.bump.outputs.new_versions }}"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🔍 **Dry run — nothing was published or committed.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **Published and committed.**" >> "$GITHUB_STEP_SUMMARY"
          fi
