group = "com.ikolvi.tracelet.flutter"
version = "3.3.0"



allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"

// Support older Flutter apps that do not have built-in Kotlin enabled.
// String concatenation is used to bypass Flutter's regex scanner and prevent false warnings in modern Flutter.
def builtInKotlin = project.hasProperty('android.builtInKotlin') ? project.property('android.builtInKotlin').toString().toBoolean() : false
if (!builtInKotlin) {
    apply plugin: "kotlin" + "-android"
}


android {
    namespace = "com.ikolvi.tracelet.flutter"

    compileSdk = 36

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    // kotlinOptions replaced by tasks.withType at the bottom for Built-in Kotlin support



    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 26
        consumerProguardFiles("consumer-rules.pro")
    }

    dependencies {
        // Tracelet SDK — standalone geolocation engine
        // Resolved from Maven Central when published, substituted with local
        // module via includeBuild during development.
        api("com.ikolvi:tracelet-sdk:3.5.1")

        // Testing
        // Real org.json so ConfigManager's JSON persistence works under unit
        // tests (Android's bundled org.json is stubbed to return null when
        // unitTests.returnDefaultValues=true). Mirrors the tracelet-sdk module.
        testImplementation("org.json:json:20260522")
        // Optional SDK deps that some duplicated SDK-behavior tests exercise.
        testImplementation("androidx.security:security-crypto:1.1.0")
        testImplementation("com.google.android.play:integrity:1.6.0")
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.mockito:mockito-core:5.23.0")
        testImplementation("org.robolectric:robolectric:4.16.1")
        testImplementation("junit:junit:4.13.2")
        testImplementation("org.mockito.kotlin:mockito-kotlin:6.3.0")
        testImplementation("androidx.test:core:1.7.0")
        testImplementation("androidx.work:work-testing:2.11.2")
        testImplementation("org.jetbrains.kotlinx:kotlinx-coroutines-test:1.11.0")
        // JVM (JAR) build of JNA so its native dispatch (libjnidispatch,
        // incl. darwin-aarch64) is on the unit-test classpath. The runtime
        // dependency is the `@aar` variant, which omits the JVM native bits, so
        // uniffi-backed tests fail to initialise JNA without this. Mirrors the
        // tracelet-sdk module.
        testImplementation("net.java.dev.jna:jna:5.19.1")
        testRuntimeOnly("org.junit.vintage:junit-vintage-engine")
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            useJUnitPlatform()

            // Let uniffi-backed tests load the host Rust core via JNA. The lib is
            // produced by `cargo build` in sdk/rust-core (CI's "Build Host Rust
            // Library" step). Anchored to this module's dir so it resolves the
            // same whichever app includes the plugin. Tests still need the host
            // lib built first.
            def rustDebugDir = new File(project.projectDir, "../../../sdk/rust-core/target/debug")
            systemProperty "jna.library.path", rustDebugDir.absolutePath
            // The plugin's companion `init` calls System.loadLibrary("tracelet_core"),
            // which uses java.library.path (not jna.library.path). Prepend the host
            // lib dir so plugin-instantiating tests can load it.
            systemProperty "java.library.path",
                rustDebugDir.absolutePath + File.pathSeparator + System.getProperty("java.library.path", "")

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }

    packaging {
        resources {
            excludes += "META-INF/versions/9/OSGI-INF/MANIFEST.MF"
        }
    }
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).all {
    kotlinOptions {
        jvmTarget = "17"
    }
}
