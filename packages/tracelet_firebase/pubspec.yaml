name: tracelet_firebase
description: >-
  Firebase adapter for Tracelet. Automatically configures native HTTP sync to push locations directly to the Firebase RTDB and manages background auth token refresh.
version: 3.0.0
license: Apache-2.0
homepage: https://github.com/Ikolvi/Tracelet
repository: https://github.com/Ikolvi/Tracelet/tree/main/packages/tracelet_firebase
issue_tracker: https://github.com/Ikolvi/Tracelet/issues
resolution: workspace

environment:
  sdk: '>=3.10.3 <4.0.0'
  flutter: ">=3.22.0"

platforms:
  android:
  ios:
  web:

dependencies:
  flutter:
    sdk: flutter
  tracelet: '^3.0.0'
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '6.0.0'
