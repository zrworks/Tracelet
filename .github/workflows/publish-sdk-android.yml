# ⚠️ DEPRECATED: Use release.yml instead for unified one-click releases.
# This standalone workflow is kept for individual SDK publishes if needed.
name: Publish Android SDK to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0). Leave empty to use current SDK_VERSION."
        required: false
        type: string
      dry_run:
        description: "Dry run (build & sign without uploading)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: publish-sdk-android
  cancel-in-progress: false

jobs:
  publish:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Resolve version ──
      - name: Resolve version
        id: version
        working-directory: sdk/android
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            # Update gradle.properties with the requested version
            sed -i "s/^SDK_VERSION=.*/SDK_VERSION=${VERSION}/" gradle.properties
            echo "📦 Using input version: $VERSION"
          else
            VERSION=$(grep '^SDK_VERSION=' gradle.properties | cut -d= -f2)
            echo "📦 Using current SDK_VERSION: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if echo "$VERSION" | grep -q "SNAPSHOT"; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & Test ──
      - name: Build release AAR
        working-directory: sdk/android
        run: ./gradlew :tracelet-sdk:assembleRelease

      - name: Run unit tests
        working-directory: sdk/android
        run: ./gradlew :tracelet-sdk:testReleaseUnitTest

      # ── Publish to local Maven (dry run) ──
      - name: Publish to local Maven (dry run)
        if: inputs.dry_run
        working-directory: sdk/android
        run: |
          ./gradlew :tracelet-sdk:publishReleasePublicationToMavenLocal
          echo "📦 Artifacts in local Maven:"
          find ~/.m2/repository/com/ikolvi/tracelet-sdk -type f | sort

      # ── Publish to Maven Central (auto close & release) ──
      - name: Publish to Maven Central
        if: ${{ !inputs.dry_run && steps.version.outputs.is_snapshot == 'false' }}
        working-directory: sdk/android
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository

      # ── Publish snapshot ──
      - name: Publish snapshot
        if: ${{ !inputs.dry_run && steps.version.outputs.is_snapshot == 'true' }}
        working-directory: sdk/android
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToSonatype

      # ── Tag release ──
      - name: Commit & tag
        if: ${{ !inputs.dry_run && inputs.version != '' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/android/gradle.properties
          git commit -m "chore(android): release SDK v${VERSION}" || echo "No changes to commit"
          git tag "sdk-android-v${VERSION}" -m "Android SDK v${VERSION}"
          git push origin main --tags

      # ── Summary ──
      - name: Summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Android SDK Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Artifact** | \`com.ikolvi:tracelet-sdk:${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Snapshot** | ${{ steps.version.outputs.is_snapshot }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dry Run** | ${{ inputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🔍 **Dry run — nothing was uploaded.**" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.version.outputs.is_snapshot }}" = "true" ]; then
            echo "📦 **Published to Sonatype Snapshots.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Test with:" >> "$GITHUB_STEP_SUMMARY"
            echo '```kotlin' >> "$GITHUB_STEP_SUMMARY"
            echo "// settings.gradle.kts" >> "$GITHUB_STEP_SUMMARY"
            echo 'maven("https://s01.oss.sonatype.org/content/repositories/snapshots/")' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "// build.gradle.kts" >> "$GITHUB_STEP_SUMMARY"
            echo "implementation(\"com.ikolvi:tracelet-sdk:${VERSION}\")" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **Published to Maven Central.** Available in ~30 minutes." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Verify at: \`https://repo1.maven.org/maven2/com/ikolvi/tracelet-sdk/${VERSION}/\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```kotlin' >> "$GITHUB_STEP_SUMMARY"
            echo "implementation(\"com.ikolvi:tracelet-sdk:${VERSION}\")" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
