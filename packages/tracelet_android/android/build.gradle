group = "com.ikolvi.tracelet.flutter"
version = "3.1.8"



allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"


android {
    namespace = "com.ikolvi.tracelet.flutter"

    compileSdk = 36

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    // kotlinOptions replaced by tasks.withType at the bottom for Built-in Kotlin support



    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 26
        consumerProguardFiles("consumer-rules.pro")
    }

    dependencies {
        // Tracelet SDK — standalone geolocation engine
        // Resolved from Maven Central when published, substituted with local
        // module via includeBuild during development.
        implementation("com.ikolvi:tracelet-sdk:3.1.8")

        // Testing
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.mockito:mockito-core:5.23.0")
        testImplementation("org.robolectric:robolectric:4.16.1")
        testImplementation("junit:junit:4.13.2")
        testImplementation("org.mockito.kotlin:mockito-kotlin:6.3.0")
        testImplementation("androidx.test:core:1.7.0")
        testImplementation("androidx.work:work-testing:2.11.2")
        testImplementation("org.jetbrains.kotlinx:kotlinx-coroutines-test:1.11.0")
        testRuntimeOnly("org.junit.vintage:junit-vintage-engine")
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }

    packaging {
        resources {
            excludes += "META-INF/versions/9/OSGI-INF/MANIFEST.MF"
        }
    }
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).all {
    kotlinOptions {
        jvmTarget = "17"
    }
}
