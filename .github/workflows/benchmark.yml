name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Need full history to commit back to main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Install benchmark dependencies
        working-directory: benchmark
        run: flutter pub get

      - name: Run benchmarks
        id: bench
        working-directory: benchmark
        run: |
          # Run benchmark and capture output
          flutter test test/tracelet_benchmark_test.dart --reporter expanded 2>&1 | tee benchmark_output.txt

          # Extract the JSON block between "--- JSON ---" and the closing "}"
          python3 -c "
          import pathlib, re
          text = pathlib.Path('benchmark_output.txt').read_text()
          # Find JSON block after '--- JSON ---' marker
          match = re.search(r'--- JSON ---\s*\n(\{.*?\n\})', text, re.DOTALL)
          if match:
              pathlib.Path('benchmark_results.json').write_text(match.group(1))
              print('Extracted benchmark_results.json')
          else:
              print('WARNING: No JSON block found in benchmark output')
              pathlib.Path('benchmark_results.json').write_text('{}')
          "

      - name: Update BENCHMARK.md
        working-directory: benchmark
        run: |
          python3 -c "
          import subprocess, re, pathlib

          date = subprocess.check_output(['date', '-u', '+%Y-%m-%d'], text=True).strip()
          dart_ver = subprocess.check_output(['dart', '--version'], text=True, stderr=subprocess.STDOUT)
          dart_ver = re.search(r'\d+\.\d+\.\d+', dart_ver).group()
          commit = subprocess.check_output(['git', 'rev-parse', '--short', 'HEAD'], text=True).strip()

          # Read the markdown table from benchmark output
          output = pathlib.Path('benchmark_output.txt').read_text()
          table_match = re.search(r'(\| Benchmark \|.*?)(?=\n\n|\n---|\Z)', output, re.DOTALL)
          table = table_match.group(1).strip() if table_match else '(no table captured)'

          entry = f'''### {date} — Commit {commit}

          **Environment:** Dart {dart_ver}, ubuntu-latest (CI)

          {table}
          '''
          # Dedent the entry (remove leading 10-space indent from heredoc)
          import textwrap
          entry = textwrap.dedent(entry)

          bm = pathlib.Path('../BENCHMARK.md')
          content = bm.read_text()

          marker = '## Results History'
          if marker in content:
              idx = content.index(marker) + len(marker)
              content = content[:idx] + '\n\n' + entry + content[idx:]
          else:
              content += f'\n{marker}\n\n{entry}\n'

          bm.write_text(content)
          print(f'Updated BENCHMARK.md with entry for {date} ({commit})')

          # Prune: keep only the latest entry per day, max 7 days
          from datetime import datetime, timedelta
          cutoff = (datetime.utcnow() - timedelta(days=7)).strftime('%Y-%m-%d')
          content = bm.read_text()
          # Split on entry headers
          parts = re.split(r'(?=^### \d{4}-\d{2}-\d{2})', content, flags=re.MULTILINE)
          kept = []
          seen_dates = set()
          pruned = 0
          for part in parts:
              m = re.match(r'^### (\d{4}-\d{2}-\d{2})', part)
              if m:
                  entry_date = m.group(1)
                  # Drop entries older than cutoff
                  if entry_date < cutoff:
                      pruned += 1
                      continue
                  # Keep only the first (latest) entry per day
                  if entry_date in seen_dates:
                      pruned += 1
                      continue
                  seen_dates.add(entry_date)
                  kept.append(part)
              else:
                  kept.append(part)
          if pruned > 0:
              bm.write_text(''.join(kept))
              print(f'Pruned {pruned} benchmark entries (keeping latest per day, 7-day window)')
          "

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if BENCHMARK.md changed
          if git diff --quiet BENCHMARK.md; then
            echo "No benchmark changes to commit"
          else
            git add BENCHMARK.md
            git commit -m "chore(ci): update benchmark results [skip ci]"
            git push
          fi

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            benchmark/benchmark_output.txt
            benchmark/benchmark_results.json
          retention-days: 90

      - name: Performance regression check
        working-directory: benchmark
        run: |
          # Parse JSON and check for regressions against thresholds
          # Critical operations must be < 10 µs/op
          echo "Checking performance thresholds..."
          
          python3 -c "
          import json, sys

          with open('benchmark_results.json') as f:
              results = json.load(f)

          # Critical thresholds (µs/op)
          thresholds = {
              'kalman_process_single': 5.0,
              'haversine_single': 5.0,
              'pip_4v': 5.0,
              'location_fromMap': 10.0,
              'location_copyWithCoords': 5.0,
              'adaptive_compute': 5.0,
              'battery_budget_single_sample': 5.0,
              'carbon_onLocation': 5.0,
              'persist_decider_location': 5.0,
              'config_fromMap': 20.0,
              'state_fromMap': 20.0,
              'delta_encode_100': 1000.0,
              'delta_decode_100': 500.0,
          }

          failed = False
          for name, max_us in thresholds.items():
              actual = results.get(name, 0)
              status = '✅' if actual <= max_us else '❌ REGRESSION'
              print(f'{status} {name}: {actual:.2f} µs/op (threshold: {max_us} µs)')
              if actual > max_us:
                  failed = True

          if failed:
              print()
              print('⚠️ Performance regression detected!')
              sys.exit(1)
          else:
              print()
              print('All benchmarks within thresholds.')
          "
